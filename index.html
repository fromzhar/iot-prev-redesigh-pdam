<!DOCTYPE html>
<html lang="en">
<head>
    <title>PDAM IoT Monitor</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, viewport-fit=cover">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        
:root {
    --ios-bg: #f2f2f7;
    --ios-card-bg: #ffffff;
    --ios-blue: #007aff;
    --ios-green: #34c759;
    --ios-red: #ff3b30;
    --ios-orange: #ff9500;
    --ios-gray: #8e8e93;
    --ios-light-gray: #e5e5ea;
    --ios-label: #000000;
    --ios-secondary-label: #8e8e93;
    --ios-border: rgba(0, 0, 0, 0.1);
    --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

@media (prefers-color-scheme: dark) {
    :root {
        --ios-bg: #1c1c1e;
        --ios-card-bg: #2c2c2e;
        --ios-label: #ffffff;
        --ios-secondary-label: #aeaeb2;
        --ios-light-gray: #3a3a3c;
        --ios-border: rgba(255, 255, 255, 0.15);
    }
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    padding: 0;
    background-color: #000000;
    font-family: var(--font-family);
    color: var(--ios-label);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* iOS Phone Container Mockup */
.phone-container {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    max-height: 932px;
    background-color: var(--ios-bg);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border-radius: 44px;
    border: 12px solid #2d2d30;
}

/* iOS Top Status Bar */
.ios-status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 47px;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1010;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ios-label);
}

.dynamic-island {
    width: 110px;
    height: 30px;
    background-color: #000000;
    border-radius: 20px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 10px;
    z-index: 1011;
}

.ios-icons {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
}

.battery-icon {
    width: 22px;
    height: 11px;
    border: 1px solid var(--ios-label);
    border-radius: 3px;
    padding: 1px;
    position: relative;
    display: flex;
}

.battery-icon::after {
    content: '';
    width: 1.5px;
    height: 4px;
    background-color: var(--ios-label);
    position: absolute;
    right: -3.5px;
    top: 2.5px;
    border-radius: 0 1px 1px 0;
}

.battery-level {
    width: 80%;
    height: 100%;
    background-color: var(--ios-label);
    border-radius: 1px;
}

/* Glassmorphism Header */
.ios-nav-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 94px;
    padding: 47px 16px 0 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(242, 242, 247, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 1000;
    border-bottom: 0.5px solid var(--ios-border);
}

@media (prefers-color-scheme: dark) {
    .ios-nav-header {
        background: rgba(28, 28, 30, 0.8);
    }
}

.nav-btn {
    color: var(--ios-blue);
    text-decoration: none;
    font-size: 17px;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 4px;
    position: relative;
}

.nav-btn i {
    font-size: 20px;
}

.nav-title-inline {
    font-weight: 600;
    font-size: 17px;
    color: var(--ios-label);
}

/* Scrollable main view */
.ios-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-top: 106px;
    padding-bottom: 92px;
    -webkit-overflow-scrolling: touch;
}

.ios-content::-webkit-scrollbar {
    display: none;
}

/* Large App Title styling */
.ios-large-title {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -1px;
    margin: 8px 0 20px 0;
    color: var(--ios-label);
}

/* iOS Card widgets */
.ios-card {
    background-color: var(--ios-card-bg);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    border: 0.5px solid var(--ios-border);
}

.ios-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.ios-card-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--ios-secondary-label);
    letter-spacing: 0.5px;
    margin: 0;
}

.ios-card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
}

/* Color codes */
.bg-ios-blue { background-color: rgba(0, 122, 255, 0.15); color: var(--ios-blue); }
.bg-ios-green { background-color: rgba(52, 199, 89, 0.15); color: var(--ios-green); }
.bg-ios-red { background-color: rgba(255, 59, 48, 0.15); color: var(--ios-red); }
.bg-ios-orange { background-color: rgba(255, 149, 0, 0.15); color: var(--ios-orange); }

/* iOS Lists (Grouped) */
.ios-list {
    background-color: var(--ios-card-bg);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
    padding: 0;
    list-style: none;
    border: 0.5px solid var(--ios-border);
}

.ios-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--ios-border);
    color: var(--ios-label);
    text-decoration: none;
    font-size: 17px;
}

.ios-list-item:last-child {
    border-bottom: none;
}

.ios-list-item:active {
    background-color: var(--ios-light-gray);
}

.ios-list-label {
    display: flex;
    align-items: center;
    gap: 12px;
}

.ios-list-label i {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: white;
}

.ios-list-value {
    color: var(--ios-secondary-label);
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.chevron-right {
    color: var(--ios-border);
    font-size: 14px;
}

/* iOS Toggle Switch */
.ios-switch {
    position: relative;
    display: inline-block;
    width: 51px;
    height: 31px;
    margin: 0;
}

.ios-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.ios-switch-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: var(--ios-light-gray);
    transition: .25s;
    border-radius: 34px;
}

.ios-switch-slider:before {
    position: absolute;
    content: "";
    height: 27px;
    width: 27px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    transition: .25s;
    border-radius: 50%;
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
}

.ios-switch input:checked + .ios-switch-slider {
    background-color: var(--ios-green);
}

.ios-switch input:checked + .ios-switch-slider:before {
    transform: translateX(20px);
}

.ios-switch input:disabled + .ios-switch-slider {
    opacity: 0.5;
    cursor: not-allowed;
}

/* iOS Buttons */
.ios-btn-primary {
    background-color: var(--ios-blue);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 17px;
    font-weight: 600;
    width: 100%;
    text-align: center;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    transition: background-color 0.2s;
}

.ios-btn-primary:active {
    background-color: #0056b3;
}

.ios-btn-danger {
    background-color: var(--ios-red);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 17px;
    font-weight: 600;
    width: 100%;
    text-align: center;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
}

.ios-btn-danger:active {
    background-color: #c70000;
}

/* iOS bottom sheet and timeline */
.ios-bottom-sheet {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -100%;
    height: 65%;
    background-color: var(--ios-card-bg);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.25);
    z-index: 1050;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
    display: flex;
    flex-direction: column;
}

.ios-bottom-sheet.show {
    transform: translateY(-100%);
}

.sheet-backdrop {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0.4);
    z-index: 1040;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.sheet-backdrop.show {
    opacity: 1;
    pointer-events: auto;
}

.sheet-handle {
    width: 36px;
    height: 5px;
    background-color: var(--ios-light-gray);
    border-radius: 10px;
    margin: 12px auto;
    cursor: pointer;
}

.sheet-header {
    padding: 0 20px 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 0.5px solid var(--ios-border);
}

.sheet-header h3 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
}

.sheet-actions {
    display: flex;
    gap: 12px;
}

.action-btn {
    color: var(--ios-blue);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
}

.sheet-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}

/* Glassmorphism Tab Bar */
.ios-tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 83px;
    padding-bottom: 20px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: rgba(248, 248, 250, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 1000;
    border-top: 0.5px solid var(--ios-border);
}

@media (prefers-color-scheme: dark) {
    .ios-tab-bar {
        background: rgba(28, 28, 30, 0.9);
    }
}

.tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--ios-gray);
    text-decoration: none;
    font-size: 10px;
    font-weight: 500;
    gap: 4px;
    flex: 1;
    padding-top: 6px;
}

.tab-item i {
    font-size: 22px;
}

.tab-item.active {
    color: var(--ios-blue);
}

.ios-home-indicator {
    position: absolute;
    bottom: 8px;
    width: 140px;
    height: 5px;
    background-color: var(--ios-label);
    border-radius: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1001;
    pointer-events: none;
}

.ios-badge {
    position: absolute;
    top: -5px;
    right: -8px;
    background-color: var(--ios-red);
    color: white;
    font-size: 10px;
    font-weight: bold;
    border-radius: 10px;
    padding: 1px 5px;
    min-width: 16px;
    text-align: center;
}

/* Forms input fields styling */
.ios-form-group {
    margin-bottom: 16px;
}

.ios-form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    color: var(--ios-secondary-label);
    margin-bottom: 6px;
    padding-left: 4px;
}

.ios-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
}

.ios-input-wrap i {
    position: absolute;
    left: 12px;
    color: var(--ios-secondary-label);
    font-size: 16px;
}

.ios-input-wrap input {
    width: 100%;
    padding: 12px 12px 12px 38px;
    border-radius: 10px;
    border: none;
    background-color: var(--ios-light-gray);
    color: var(--ios-label);
    font-size: 17px;
    font-family: var(--font-family);
    outline: none;
}

.ios-input-wrap input:focus {
    box-shadow: inset 0 0 0 1px var(--ios-blue);
}

.metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.text-critical {
    color: var(--ios-red) !important;
}

/* Pulsing cards for threshold alerts */
.card-warning-pulse {
    animation: warning-pulse 2s infinite;
    border: 1px solid var(--ios-red) !important;
}

@keyframes warning-pulse {
    0% { background-color: var(--ios-card-bg); }
    50% { background-color: rgba(255, 59, 48, 0.05); }
    100% { background-color: var(--ios-card-bg); }
}

/* Responsive layout on mobile screens */
@media (max-width: 480px) {
    body {
        background-color: var(--ios-bg);
    }
    .phone-container {
        max-width: 100%;
        height: 100vh;
        max-height: 100%;
        border-radius: 0;
        border: none;
    }
}

        
        .landing-wrap {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: linear-gradient(135deg, #1d4e89 0%, #007aff 100%) !important;
            padding: 30px 24px;
            color: #ffffff;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }
        
        .logo-section {
            margin-top: 60px;
        }
        
        .logo-icon {
            font-size: 72px;
            color: #ffffff;
            margin-bottom: 16px;
            animation: bounce-logo 2s infinite alternate;
        }
        
        @keyframes bounce-logo {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
        
        .brand-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .brand-desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 280px;
            margin: 12px auto 0 auto;
            line-height: 1.4;
        }
        
        .actions-section {
            width: 100%;
            margin-bottom: 40px;
        }
        
        .btn-landing-primary {
            background-color: #ffffff;
            color: #007aff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.2s;
        }
        
        .btn-landing-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        .btn-landing-secondary {
            background-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            margin-top: 14px;
            backdrop-filter: blur(10px);
        }
        
        .btn-landing-secondary:active {
            background-color: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="dynamic-island"></div>
    
    <div class="ios-status-bar" style="color:#ffffff;">
        <div id="status-bar-time">09:41</div>
        <div class="ios-icons">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <div class="battery-icon" style="border-color:#ffffff;">
                <div class="battery-level" style="background-color:#ffffff;"></div>
            </div>
        </div>
    </div>
    
    <div class="landing-wrap">
        <div class="logo-section">
            <i class="fa-solid fa-house-flood-water logo-icon"></i>
            <div class="brand-title">PDAM IoT</div>
            <p class="brand-desc">Real-time water level, pump energy, flow, and quality monitoring platform.</p>
        </div>
        
        <div class="actions-section" id="auth-buttons-container">
            <!-- Populated dynamically based on local login state -->
        </div>
    </div>

    <div class="ios-home-indicator" style="background-color:#ffffff;"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    function updateClock() {
        const now = new Date();
        const hrs = now.getHours().toString().padStart(2, '0');
        const mins = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('status-bar-time').innerText = hrs + ':' + mins;
    }
    setInterval(updateClock, 1000);
    updateClock();

    $(document).ready(function() {
        const user = localStorage.getItem('currentUser');
        const container = $('#auth-buttons-container');

        if (user) {
            container.html(`
                <a href="dashboard.html" class="btn-landing-primary">
                    <i class="fa-solid fa-gauge-high"></i> Enter Dashboard
                </a>
                <a href="#" onclick="logoutLanding(); return false;" class="btn-landing-secondary">
                    <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                </a>
            `);
        } else {
            container.html(`
                <a href="login.html" class="btn-landing-primary">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
                </a>
                <a href="register.html" class="btn-landing-secondary">
                    <i class="fa-solid fa-user-plus"></i> Register Account
                </a>
            `);
        }
    });

    function logoutLanding() {
        localStorage.removeItem('currentUser');
        window.location.reload();
    }
</script>
</body>
</html>
